<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Landing - Front-end NERDs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Front-end NERDs</h1>
    </div>
  </header>

  <main class="hero">
    <div class="container hero-inner">
      <section class="hero-content">
        <h2>Tarefa:</h2>
        <ul>
          <li>Cabeçalho com título;</li>
          <li>Uma seção principal com texto de apresentação;</li>
          <li>Um formulário com campos de nome e e-mail;</li>
          <li>Um botão estilizado com CSS.</li>
        </ul>
      </section>

      <aside class="hero-form">
        <form class="lead-form" action="#" method="post" novalidate>
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" placeholder="Seu nome" required>

          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="seu@exemplo.com" required>

          <button type="submit" class="btn-primary">Enviar</button>
        </form>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">&copy; 2025 Frontend NERDs</div>
  </footer>
</body>
</html>
